<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yangss.xyz</title>
    <style>
        /* Modern System Font Stack & Reset */
        :root {
            --bg-color: #faf8f5;
            --text-color: #1a1a1a;
            --text-muted: #6b6661;
            --accent-color: #c95d24; /* Terracotta / Amber Warm Accent */
            --border-color: #e6e1dc;
            --shadow-color: rgba(26, 26, 26, 0.04);
            --transition-speed: 0.3s;
        }

        [data-theme="dark"] {
            --bg-color: #121211;
            --text-color: #e5e1dc;
            --text-muted: #9c9690;
            --accent-color: #f08143;
            --border-color: #2a2927;
            --shadow-color: rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: background-color var(--transition-speed), color var(--transition-speed);
            overflow-x: hidden;
        }

        /* Subtle glowing background glow */
        .ambient-glow {
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80vw;
            height: 40vh;
            background: radial-gradient(circle, rgba(201, 93, 36, 0.05) 0%, rgba(201, 93, 36, 0) 70%);
            z-index: -1;
            pointer-events: none;
            transition: background var(--transition-speed);
        }

        [data-theme="dark"] .ambient-glow {
            background: radial-gradient(circle, rgba(240, 129, 67, 0.04) 0%, rgba(240, 129, 67, 0) 70%);
        }

        header {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }

        .logo {
            font-weight: 600;
            font-size: 1.125rem;
            letter-spacing: -0.02em;
            color: var(--text-color);
            text-decoration: none;
            transition: color var(--transition-speed);
        }

        /* Toggle Button */
        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-color);
            padding: 0.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .theme-toggle:hover {
            background-color: var(--border-color);
        }

        .theme-toggle svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Main Content Container */
        main {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 0 2rem;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .hero {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.2s;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8125rem;
            font-weight: 500;
            background-color: var(--border-color);
            color: var(--text-muted);
            padding: 0.35rem 0.75rem;
            border-radius: 100px;
            margin-bottom: 1.5rem;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-color);
            border-radius: 50%;
            position: relative;
        }

        .status-dot::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: var(--accent-color);
            animation: pulse 2s infinite;
        }

        /* Large Elegant Title */
        h1 {
            font-family: Georgia, serif;
            font-weight: 400;
            font-size: 3.5rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            letter-spacing: -0.01em;
            color: var(--text-color);
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.75rem;
            }
        }

        /* Subheading description */
        .description {
            font-size: 1.125rem;
            line-height: 1.6;
            color: var(--text-muted);
            max-width: 520px;
            margin-bottom: 2.5rem;
            transition: color var(--transition-speed);
        }

        /* Social / Contact Links */
        .links-container {
            display: flex;
            gap: 1.5rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9375rem;
            font-weight: 500;
            transition: color var(--transition-speed);
        }

        .social-link:hover {
            color: var(--accent-color);
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Minimal Footer */
        footer {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            font-size: 0.8125rem;
            color: var(--text-muted);
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
            animation-delay: 0.4s;
            transition: border-color var(--transition-speed), color var(--transition-speed);
        }

        .copyright {
            letter-spacing: -0.01em;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <header>
        <a href="#" class="logo">yangss</a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
            <!-- Sun Icon (Default) -->
            <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="4"></circle>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
            </svg>
            <!-- Moon Icon (Hidden initially) -->
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="display: none;">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
            </svg>
        </button>
    </header>

    <main>
        <div class="hero">
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>dreaming & building</span>
            </div>
            <h1>Welcome.</h1>
            <p class="description">
                This is my personal space on the web. Currently cooking up something exciting—stay tuned.
            </p>
            <div class="links-container">
                <a href="https://github.com/davidyangss" class="social-link" target="_blank" rel="noopener noreferrer">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
                    </svg>
                    GitHub
                </a>
                <a href="mailto:yangss.xyz@gmail.com" class="social-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect width="20" height="16" x="2" y="4" rx="2"></rect>
                        <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
                    </svg>
                    Contact
                </a>
            </div>
        </div>
    </main>

    <footer>
        <span class="copyright">&copy; 2026 yangss</span>
        <span class="constructed">Handcrafted with care</span>
    </footer>

    <script>
        // Light / Dark Theme Logic
        const themeToggle = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');

        // Check user preference
        const getPreferredTheme = () => {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme) {
                return savedTheme;
            }
            // Auto-detect system settings
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        };

        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);

            if (theme === 'dark') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        };

        // Initialize theme
        const currentTheme = getPreferredTheme();
        setTheme(currentTheme);

        // Listen for system color scheme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('theme')) {
                setTheme(e.matches ? 'dark' : 'light');
            }
        });

        // Toggle action
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            setTheme(target);
        });
    </script>
</body>
</html>
